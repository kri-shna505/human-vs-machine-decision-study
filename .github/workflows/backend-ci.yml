name: Backend CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Test, migrate, and lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    env:
      APP_NAME: Human vs Machine Decision Study
      APP_MODE: demonstration
      POSTGRES_DB: decision_study
      POSTGRES_USER: decision_user
      POSTGRES_PASSWORD: decision_password
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      FRONTEND_ORIGIN: http://localhost:5173

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: decision_study
          POSTGRES_USER: decision_user
          POSTGRES_PASSWORD: decision_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd
          "pg_isready -U decision_user -d decision_study"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip check

      - name: Lint backend
        run: python -m ruff check app tests

      - name: Check backend formatting
        run: python -m ruff format --check app tests

      - name: Compile Python sources
        run: python -m compileall -q app migrations tests

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Verify migration state
        run: python -m alembic check

      - name: Run backend tests with coverage
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml
